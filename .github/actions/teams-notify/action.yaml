name: "MS Teams notify (internal)"
description: "Post a message to Microsoft Teams via webhook"
inputs:
  webhook_url:
    required: true
    description: "Teams webhook URL"
  title:
    required: false
    default: "GitHub Actions"
  message:
    required: true
  color:
    required: false
    default: "2EB886" # green
  button_text:
    required: false
    default: "View run"
  button_url:
    required: false
    default: ""
  deployment_status_button_text:
    required: false
    default: "View deployment status"
  deployment_status_button_url:
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Debug webhook url
      shell: bash
      run: |
        echo "WEBHOOK_URL as printed:"
        printf '[%s]\n' "$WEBHOOK_URL"

        echo "WEBHOOK_URL repr (shows hidden chars):"
        python - <<'PY'
        import os
        u=os.environ.get("WEBHOOK_URL","")
        print(repr(u))
        PY
      env:
        WEBHOOK_URL: ${{ inputs.webhook_url }}

    - name: Sanitize and call webhook
      shell: bash
      run: |
        url="$(printf '%s' "$WEBHOOK_URL" | tr -d '\r\n' | xargs)"
        curl -sS -X POST \
        -H "Content-Type: application/json" \
        --data "$payload" \
        "$url"
      env:
        WEBHOOK_URL: ${{ inputs.webhook_url }}

    - name: Post to Teams
      shell: bash
      env:
        WEBHOOK_URL: ${{ inputs.webhook_url }}
        TITLE: ${{ inputs.title }}
        MESSAGE: ${{ inputs.message }}
        COLOR: ${{ inputs.color }}
        BUTTON_TEXT: ${{ inputs.button_text }}
        BUTTON_URL: ${{ inputs.button_url }}
        DEPLOYMENT_STATUS_BUTTON_TEXT: ${{ inputs.deployment_status_button_text }}
        DEPLOYMENT_STATUS_BUTTON_URL: ${{ inputs.deployment_status_button_url }}

      run: |
        set -euo pipefail

        if [ -n "${BUTTON_URL}" ]; then
          ACTIONS=$(cat <<EOF
        [{
        "@type": "OpenUri",
        "name": "${BUTTON_TEXT}",
        "targets": [{ "os": "default", "uri": "${BUTTON_URL}" }]
        }]
        EOF
        )
        else
          ACTIONS="[]"
        fi


        if [ -n "${DEPLOYMENT_STATUS_BUTTON_URL}" ]; then
          DEPLOYMENT_STATUS_ACTIONS=$(cat <<EOF
        [{
        "@type": "OpenUri",
        "name": "${DEPLOYMENT_STATUS_BUTTON_TEXT}",
        "targets": [{ "os": "default", "uri": "${DEPLOYMENT_STATUS_BUTTON_URL}" }]
        }]
        EOF
        )
        else
          DEPLOYMENT_STATUS_ACTIONS="[]"
        fi

        payload="$(
        jq -n \
          --arg type "MessageCard" \
          --arg context "https://schema.org/extensions" \
          --arg color "$COLOR" \
          --arg title "$TITLE" \
          --arg message "$MESSAGE" \
          --arg button_text "${BUTTON_TEXT:-}" \
          --arg button_url "${BUTTON_URL:-}" \
          --arg ds_button_text "${DEPLOYMENT_STATUS_BUTTON_TEXT:-}" \
          --arg ds_button_url "${DEPLOYMENT_STATUS_BUTTON_URL:-}" \
        '
        def openuri($name; $url):
          { "@type":"OpenUri"
          ,"name": $name
          , "targets":[{"os":"default","uri":$url}]
          };

        def btnviewrun:
          if ($button_url|length) > 0 then [openuri($button_text; $button_url)] else [] end;

        def btndeploymentstatus:
          if ($ds_button_url|length) > 0 then [openuri($ds_button_text; $ds_button_url)] else [] end;

        {
          "@type": $type,
          "@context": $context,
          "themeColor": $color,
          "summary": $title,
          "title": $title,
          "text": $message,
          "potentialAction":
            ((if ($title | contains("Deployment Started.")) then btnviewrun else (btnviewrun + btndeploymentstatus) end))
        }'
        )"
        curl -sS -X POST -H "Content-Type: application/json" --data "$payload" "$WEBHOOK_URL"
